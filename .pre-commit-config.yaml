default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=2000]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-symlinks
      - id: check-toml
      - id: check-xml
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: name-tests-test
        args: [--pytest-test-first]  # expect test_*.py (pytest convention)
      - id: pretty-format-json
        # .ipynb is JSON, but it is owned by the notebook tooling (nbformat / nbqa /
        # ruff), which writes 1-space indent. pretty-format-json writes 2-space indent, so
        # the two fight and the hook never converges. Skip notebooks; it still covers .json.
        exclude_types: [jupyter]
        args: [--autofix, --no-sort-keys]
      - id: sort-simple-yaml
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.19
    hooks:
      - id: ruff
        args: [--fix]
        types_or: [python, pyi, jupyter]

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        args: [--safe]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: "v2.1.0"
    hooks:
      - id: mypy
        # Each study has its own standalone download_data.py; they share a module name
        # but live in non-package (hyphenated) dirs, so mypy can't disambiguate them.
        # They're thin scripts imported by path at runtime -- skip them here.
        exclude: 'download_data\.py$'
        args:
          [
            --no-strict-optional,
            --ignore-missing-imports,
            --install-types,
            --non-interactive,
          ]

  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-black
        args: [--safe]
      - id: nbqa-mypy
        args:
          [
            --no-strict-optional,
            --ignore-missing-imports,
            --install-types,
            --non-interactive,
          ]
